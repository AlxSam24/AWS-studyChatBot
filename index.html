<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS AI Practitioner Study Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1b2330;
    --surface: #232f3e;
    --surface-2: #2c3a4d;
    --accent: #f2a93b;
    --accent-dim: #c98a2e;
    --text: #ece8e1;
    --text-dim: #93a0b0;
    --border: #34465c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 640px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 80vh;
    max-height: 760px;
  }
  header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }
  header .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 6px;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    margin: 0 0 4px;
  }
  header p {
    font-size: 13px;
    color: var(--text-dim);
    margin: 0;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg { max-width: 85%; }
  .msg.user {
    align-self: flex-end;
    background: var(--accent);
    color: #2b1c00;
    padding: 10px 14px;
    border-radius: 10px 10px 2px 10px;
    font-size: 14px;
  }
  .msg.bot {
    align-self: flex-start;
  }
  .msg.bot .bubble {
    background: var(--surface-2);
    padding: 12px 14px;
    border-radius: 10px 10px 10px 2px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .msg.bot .source {
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .msg.bot .source::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }
  .msg.system {
    align-self: center;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
  }
  form {
    display: flex;
    gap: 8px;
    padding: 16px;
    border-top: 1px solid var(--border);
  }
  input[type="text"] {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  input[type="text"]::placeholder { color: var(--text-dim); }
  button {
    background: var(--accent);
    color: #2b1c00;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent-dim); }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    margin-left: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <p class="eyebrow">AWS AI Practitioner</p>
      <h1>Study assistant</h1>
      <p>Answers are grounded in AWS documentation via Amazon Bedrock Knowledge Bases.</p>
    </header>
    <div class="messages" id="messages">
      <div class="msg system">Ask a question about AWS AI &amp; ML services to begin.</div>
    </div>
    <form id="chat-form">
      <input type="text" id="question" placeholder="e.g. What is the difference between Bedrock and SageMaker?" autocomplete="off" required>
      <button type="submit" id="send-btn">Ask</button>
    </form>
  </div>

<script>
  // TODO: replace with your own API Gateway invoke URL + /ask
  const API_URL = "https://gs30858es7.execute-api.us-east-1.amazonaws.com/ask";

  const form = document.getElementById('chat-form');
  const input = document.getElementById('question');
  const messages = document.getElementById('messages');
  const sendBtn = document.getElementById('send-btn');

  function addMessage(text, role, source) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    if (role === 'bot') {
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);
      if (source) {
        const src = document.createElement('div');
        src.className = 'source';
        src.textContent = source;
        wrap.appendChild(src);
      }
    } else {
      wrap.textContent = text;
    }
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
    return wrap;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, 'user');
    input.value = '';
    sendBtn.disabled = true;

    const loadingMsg = addMessage('Thinking', 'bot');
    loadingMsg.querySelector('.bubble').classList.add('loading');

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question })
      });
      const data = await res.json();
      loadingMsg.remove();

      if (data.answer) {
        addMessage(data.answer, 'bot', 'Source: AWS knowledge base');
      } else {
        addMessage('No answer was returned. Check the Lambda logs.', 'bot');
      }
    } catch (err) {
      loadingMsg.remove();
      addMessage('Could not reach the API. Check the API_URL and CORS settings.', 'bot');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
